        /* --- HEADER AREA --- */
        .header-title { text-align: center; margin-bottom: 30px; }
        .label { font-size: 0.9rem; color: var(--gold); letter-spacing: 5px; margin-bottom: 10px; opacity: 0.8; }

        h1 {
            font-size: 3.2rem;
            margin: 0;
            background: linear-gradient(to bottom, #f0e6d2 20%, #c89b3c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(200, 155, 60, 0.5));
            letter-spacing: 2px;
            line-height: 1.1;
        }

        h1.ended {
            background: linear-gradient(to bottom, #ff8080 20%, #ff4655 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 70, 85, 0.6));
        }

        /* --- TIMER AREA --- */
        .timer-container {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--gold);
            padding: 20px 60px;
            position: relative;
            box-shadow: inset 0 0 25px rgba(0, 207, 188, 0.15), 0 0 40px rgba(0,0,0,0.9);
            margin-bottom: 60px;
            transition: all 0.5s ease;
        }

        #countdown {
            font-size: 3.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px var(--blue-magic);
            font-family: 'Courier New', monospace;
        }

        /* --- ANIMATIONS & STATES --- */
        @keyframes urgency-pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(200, 155, 60, 0.4)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 0 25px rgba(200, 155, 60, 0.8)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(200, 155, 60, 0.4)); }
        }

        @keyframes panic-pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(255, 140, 0, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 35px rgba(255, 140, 0, 0.8)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(255, 140, 0, 0.5)); }
        }

        /* Class for < 3 days */
        .urgent {
            animation: urgency-pulse 2s infinite ease-in-out !important;
        }

        /* Class for < 1 day */
        .critical {
            animation: panic-pulse 1s infinite ease-in-out !important;
            color: var(--warning-orange) !important;
            text-shadow: 0 0 25px var(--warning-orange) !important;
        }

        #countdown.ended {
            color: var(--danger-red) !important;
            text-shadow: 0 0 20px var(--danger-red) !important;
        }

        .timer-container.ended {
            border-color: var(--danger-red);
            box-shadow: 0 0 50px rgba(255, 70, 85, 0.3);
        }

        /* --- PLAYERS AREA --- */
        .players-wrapper { display: flex; gap: 80px; }

        .player-card {
            text-align: center;
            width: 320px;
            padding: 40px 20px;
            background: rgba(1, 10, 19, 0.5);
            border: 2px solid var(--gold);
            backdrop-filter: blur(5px);
            position: relative;
            transition: transform 0.4s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            cursor: default;
        }

        .player-card:hover {
            transform: translateY(-5px);
            border-color: var(--blue-magic);
            box-shadow: 0 0 25px rgba(0, 207, 188, 0.3);
        }

        .player-card::before, .player-card::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid var(--gold-bright);
        }
        .player-card::before { top: -6px; left: -6px; border-right: none; border-bottom: none; }
        .player-card::after { bottom: -6px; right: -6px; border-left: none; border-top: none; }

        .profile-icon-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin: 0 auto 20px auto;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            background: var(--client-dark);
        }

        .profile-icon { width: 100%; height: 100%; object-fit: cover; }

        .player-name { 
            font-size: 2.6rem; color: #fff; margin: 0; 
            text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        
        .player-tag { 
            font-size: 1.1rem; color: var(--blue-magic); 
            margin-bottom: 30px; font-weight: bold; letter-spacing: 1px;
        }

        .opgg-btn {
            background: var(--client-dark);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 14px 40px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 10px rgba(200, 155, 60, 0.1);
        }

        .opgg-btn:hover {
            background: var(--gold);
            color: #010a13;
            box-shadow: 0 0 25px rgba(200, 155, 60, 0.7);
        }
    </style>
</head>
<body>

    <div class="header-title">
        <div class="label">LEAGUE OF LEGENDS CHALLENGE</div>
        <h1 id="main-title">TIME IS TICKING,<br>WHO WILL WIN THE 20$?</h1>
    </div>

    <div class="timer-container" id="timer-box">
        <div id="countdown">LOADING...</div>
    </div>

    <div class="players-wrapper">
        <div class="player-card">
            <div class="profile-icon-container">
                <img src="https://ddragon.leagueoflegends.com/cdn/14.1.1/img/champion/Viego.png" alt="ruined icon" class="profile-icon">
            </div>
            <div class="player-name">ruined</div>
            <div class="player-tag">#254</div>
            <button class="opgg-btn" onclick="openProfile('ruined', '254')">VIEW RANK</button>
        </div>

        <div class="player-card">
            <div class="profile-icon-container">
                <img src="https://ddragon.leagueoflegends.com/cdn/14.1.1/img/champion/Riven.png" alt="piggy icon" class="profile-icon">
            </div>
            <div class="player-name">piggy</div>
            <div class="player-tag">#riven</div>
            <button class="opgg-btn" onclick="openProfile('piggy', 'riven')">VIEW RANK</button>
        </div>
    </div>

    <script>
        function openProfile(name, tag) {
            const region = 'eune'; 
            const url = `https://www.op.gg/summoners/${region}/${name}-${tag}`;
            window.open(url, '_blank');
        }

        function updateTimer() {
            const now = new Date();
            const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
            const diff = nextMonth - now;

            const countdownEl = document.getElementById('countdown');
            const titleEl = document.getElementById('main-title');
            const timerBox = document.getElementById('timer-box');

            // Reset classes
            countdownEl.classList.remove('urgent', 'critical', 'ended');
            timerBox.classList.remove('ended');

            if (diff <= 0) {
                countdownEl.innerHTML = "00D 00H 00M 00S";
                countdownEl.classList.add('ended');
                titleEl.innerHTML = "CHALLENGE ENDED,<br>WHO WON?";
                titleEl.classList.add('ended');
                timerBox.classList.add('ended');
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            // Apply urgency effects
            if (d < 1) {
                countdownEl.classList.add('critical'); // Less than 24h
            } else if (d < 3) {
                countdownEl.classList.add('urgent'); // Less than 3 days
            }

            const fmt = (n) => n.toString().padStart(2, '0');
            countdownEl.innerHTML = `${d}D ${fmt(h)}H ${fmt(m)}M ${fmt(s)}S`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
